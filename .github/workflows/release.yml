name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        id: changesets
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release for published packages
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PACKAGES" | jq -r '.[] | "v\(.version)"' | while read -r tag; do
            gh release create "$tag" --title "$tag" --generate-notes
          done
      - name: Set ci-pass status on Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          sleep 5
          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          gh api "repos/${{ github.repository }}/statuses/${PR_SHA}" \
            -f state=success \
            -f context=ci-pass \
            -f description="Version Packages PR — source already verified on main"
          # Retry if SHA changed due to API eventual consistency
          sleep 5
          NEW_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          if [ "$NEW_SHA" != "$PR_SHA" ]; then
            gh api "repos/${{ github.repository }}/statuses/${NEW_SHA}" \
              -f state=success \
              -f context=ci-pass \
              -f description="Version Packages PR — source already verified on main"
          fi
